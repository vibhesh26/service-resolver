<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Dependency Resolver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-shell">
    <header>
        <h1>Service Dependency Resolver</h1>
        <p>Use the buttons below to manage services, view deployment order, and inspect dependency graphs.</p>
    </header>

    <section class="toolbar">
        <button id="open-create-btn">Create Service</button>
        <button id="refresh-graph-btn">Refresh Graph</button>
    </section>

    <section class="cards">
        <div class="card">
            <h2>Impacted Services</h2>
            <label>Service name</label>
            <input id="impacted-service-input" placeholder="config-service">
            <button id="get-impacted-btn">Get Impacted Services</button>
            <div id="impacted-output" class="output-box"></div>
        </div>

        <div class="card">
            <h2>Deployment Order</h2>
            <div class="row">
                <label>Page <input id="deployment-page" type="number" min="0" value="0"></label>
                <label>Size <input id="deployment-size" type="number" min="1" value="10"></label>
            </div>
            <button id="get-deployment-btn">Get Deployment Order</button>
            <div id="deployment-output" class="output-box"></div>
        </div>
    </section>

    <section class="graph-panel">
        <div class="graph-header">
            <h2>Dependency Graph</h2>
            <p id="graph-message">Loaded graph data for all services.</p>
        </div>
        <div class="graph-frame">
            <svg id="dependency-graph" width="1000" height="600"></svg>
        </div>
    </section>
</div>

<div id="create-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Create Service</h2>
        <label>Service name</label>
        <input id="create-service-name" placeholder="service-name">
        <label>Dependencies (comma-separated)</label>
        <input id="create-dependencies" placeholder="dep1, dep2">
        <div class="modal-actions">
            <button id="submit-create-btn">Create</button>
            <button id="cancel-create-btn">Cancel</button>
        </div>
        <div id="create-result" class="output-box"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
